<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <!-- CSS -->
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
    <link
      rel="stylesheet"
      type="text/css"
      th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"
    />
  </head>
  <body>
    <div class="container">
      <div class="mt-4 mb-4 d-flex justify-content-center">
        <div class="card" style="width: 400px">
          <div class="card-body">
            <h5 class="card-title text-center">Login Page</h5>
            <div>
              <form data-th-action="@{/login}" method="post">
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />

                <div class="input-group mb-3">
                  <label class="input-group-text">Username</label>
                  <input type="text" name="username" class="form-control" />
                </div>

                <div class="input-group mb-3">
                  <label class="input-group-text">Password</label>
                  <input type="password" name="password" class="form-control" />
                </div>

                <div class="d-flex justify-content-center">
                  <button type="submit" class="btn btn-primary">Login</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- script -->
    <script
      type="text/javascript"
      th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.js}"
    ></script>
  </body>
</html>
